apiVersion: apps/v1
kind: Deployment
metadata: { name: claricore-api }
spec:
  replicas: 1
  selector: { matchLabels: { app: claricore-api } }
  template:
    metadata: { labels: { app: claricore-api } }
    spec:
      containers:
        - name: api
          image: ghcr.io/claricore/api:latest
          ports: [{ containerPort: 4000 }]
          envFrom: [{ configMapRef: { name: claricore-config } }, { secretRef: { name: claricore-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 4000 } }
          livenessProbe: { httpGet: { path: /health, port: 4000 } }
---
apiVersion: v1
kind: Service
metadata: { name: claricore-api }
spec:
  selector: { app: claricore-api }
  ports: [{ port: 80, targetPort: 4000 }]
