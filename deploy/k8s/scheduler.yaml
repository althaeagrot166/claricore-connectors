apiVersion: apps/v1
kind: Deployment
metadata: { name: claricore-scheduler }
spec:
  replicas: 1
  selector: { matchLabels: { app: claricore-scheduler } }
  template:
    metadata: { labels: { app: claricore-scheduler } }
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/claricore/scheduler:latest
          ports: [{ containerPort: 4300 }]
          envFrom: [{ configMapRef: { name: claricore-config } }, { secretRef: { name: claricore-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 4300 } }
          livenessProbe: { httpGet: { path: /health, port: 4300 } }
