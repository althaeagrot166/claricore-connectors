apiVersion: v1
kind: ConfigMap
metadata: { name: claricore-config }
data:
  PORT: "4000"
  WEBHOOK_PORT: "4100"
  WORKER_HEALTH_PORT: "4200"
  SCHEDULER_HEALTH_PORT: "4300"
  QUEUE_NAME: "sync-jobs"
  LOADER_TYPE: "http"
  CLARICORE_INGESTION_BASE_URL: "https://ingestion.claricore.example"
  OTEL_SERVICE_NAME: "claricore"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
---
apiVersion: v1
kind: Secret
metadata: { name: claricore-secrets }
type: Opaque
stringData:
  DATABASE_URL: "postgres://..."
  REDIS_URL: "redis://..."
  ENCRYPTION_KEY: "<64_hex_chars>"
  API_KEY: "<api-key>"
  CLARICORE_INGESTION_TOKEN: "<token>"
  WEBHOOK_SIGNATURE_SECRET: "<secret>"
