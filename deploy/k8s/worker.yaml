apiVersion: apps/v1
kind: Deployment
metadata: { name: claricore-worker }
spec:
  replicas: 1
  selector: { matchLabels: { app: claricore-worker } }
  template:
    metadata: { labels: { app: claricore-worker } }
    spec:
      containers:
        - name: worker
          image: ghcr.io/claricore/worker:latest
          ports: [{ containerPort: 4200 }]
          envFrom: [{ configMapRef: { name: claricore-config } }, { secretRef: { name: claricore-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 4200 } }
          livenessProbe: { httpGet: { path: /health, port: 4200 } }
