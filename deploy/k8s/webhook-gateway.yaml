apiVersion: apps/v1
kind: Deployment
metadata: { name: claricore-webhook-gateway }
spec:
  replicas: 1
  selector: { matchLabels: { app: claricore-webhook-gateway } }
  template:
    metadata: { labels: { app: claricore-webhook-gateway } }
    spec:
      containers:
        - name: webhook-gateway
          image: ghcr.io/claricore/webhook-gateway:latest
          ports: [{ containerPort: 4100 }]
          envFrom: [{ configMapRef: { name: claricore-config } }, { secretRef: { name: claricore-secrets } }]
          readinessProbe: { httpGet: { path: /health, port: 4100 } }
          livenessProbe: { httpGet: { path: /health, port: 4100 } }
---
apiVersion: v1
kind: Service
metadata: { name: claricore-webhook-gateway }
spec:
  selector: { app: claricore-webhook-gateway }
  ports: [{ port: 80, targetPort: 4100 }]
